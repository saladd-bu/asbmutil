name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-26
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Select Xcode 26 (Icon Composer support)
      run: |
        sudo xcode-select -s /Applications/Xcode_26.4.app
        swift --version
        xcodebuild -version

    - name: Write Version.swift
      env:
        SHA: ${{ github.sha }}
      run: |
        SHORT_SHA=$(printf '%s' "$SHA" | cut -c1-7)
        cat > Sources/core/Utilities/Version.swift << EOF
        // This file is auto-generated during build
        // Do not edit manually - changes will be overwritten

        public enum AppVersion {
            public static let version = "dev-${SHORT_SHA}"
        }
        EOF

    - name: Build all products (CLI + App + Helper)
      run: swift build -c release

    - name: Verify CLI binary
      run: |
        ls -la .build/release/asbmutil
        .build/release/asbmutil --version
        .build/release/asbmutil --help

  build-linux:
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-focal
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Write Version.swift
      env:
        SHA: ${{ github.sha }}
      run: |
        SHORT_SHA=$(printf '%s' "$SHA" | cut -c1-7)
        cat > Sources/core/Utilities/Version.swift << EOF
        // This file is auto-generated during build
        // Do not edit manually - changes will be overwritten

        public enum AppVersion {
            public static let version = "dev-${SHORT_SHA}"
        }
        EOF

    - name: Build CLI binary
      run: swift build -c release --product asbmutil --static-swift-stdlib

    - name: Verify binary
      run: |
        ls -la .build/release/asbmutil
        ldd .build/release/asbmutil | grep GLIBC | sort -u | head -5
        .build/release/asbmutil --version
