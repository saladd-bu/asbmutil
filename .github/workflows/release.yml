name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Derive version from tag
      id: version
      env:
        TAG: ${{ github.ref_name }}
      run: |
        VERSION="${TAG#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: version
    runs-on: macos-26
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Select Xcode 26 (Icon Composer support)
      run: |
        sudo xcode-select -s /Applications/Xcode_26.4.app
        swift --version
        xcodebuild -version

    - name: Build unsigned artifacts (.app, .pkg, .dmg, CLI .zip)
      env:
        VERSION: ${{ needs.version.outputs.version }}
      run: |
        make build-unsigned
        ls -la dist/

    - name: Verify CLI binary
      run: |
        .build/release/asbmutil --version
        .build/release/asbmutil --help

    - name: Upload .pkg
      uses: actions/upload-artifact@v7
      with:
        name: ASBMUtil-${{ needs.version.outputs.version }}-pkg
        path: dist/ASBMUtil-${{ needs.version.outputs.version }}.pkg

    - name: Upload .dmg
      uses: actions/upload-artifact@v7
      with:
        name: ASBMUtil-${{ needs.version.outputs.version }}-dmg
        path: dist/ASBMUtil-${{ needs.version.outputs.version }}.dmg

    - name: Upload CLI zip
      uses: actions/upload-artifact@v7
      with:
        name: asbmutil-${{ needs.version.outputs.version }}-macos-arm64
        path: dist/asbmutil-${{ needs.version.outputs.version }}-macos-arm64.zip

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-focal
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Write Version.swift
      env:
        VERSION: ${{ needs.version.outputs.version }}
      run: |
        cat > Sources/core/Utilities/Version.swift << EOF
        // This file is auto-generated during build
        // Do not edit manually - changes will be overwritten

        public enum AppVersion {
            public static let version = "${VERSION}"
        }
        EOF

    - name: Build CLI binary
      run: swift build -c release --product asbmutil --static-swift-stdlib

    - name: Verify binary
      run: |
        ls -la .build/release/asbmutil
        .build/release/asbmutil --version

    - name: Create release archive
      env:
        VERSION: ${{ needs.version.outputs.version }}
      run: |
        tar czf "asbmutil-${VERSION}-linux-amd64.tar.gz" -C .build/release asbmutil

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: asbmutil-${{ needs.version.outputs.version }}-linux-amd64
        path: asbmutil-${{ needs.version.outputs.version }}-linux-amd64.tar.gz

  release:
    needs: [version, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: ASBMUtil ${{ github.ref_name }}
        generate_release_notes: true
        files: |
          artifacts/ASBMUtil-${{ needs.version.outputs.version }}-pkg/ASBMUtil-${{ needs.version.outputs.version }}.pkg
          artifacts/ASBMUtil-${{ needs.version.outputs.version }}-dmg/ASBMUtil-${{ needs.version.outputs.version }}.dmg
          artifacts/asbmutil-${{ needs.version.outputs.version }}-macos-arm64/asbmutil-${{ needs.version.outputs.version }}-macos-arm64.zip
          artifacts/asbmutil-${{ needs.version.outputs.version }}-linux-amd64/asbmutil-${{ needs.version.outputs.version }}-linux-amd64.tar.gz
    - name: Strip attribution from release notes
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ github.ref_name }}
      run: |
        body=$(gh release view "$TAG" -R "$GITHUB_REPOSITORY" --json body --jq .body)
        cleaned=$(printf '%s\n' "$body" | sed -E -e 's/ by @[A-Za-z0-9_-]+ in / in /g' -e '/^#+ New Contributors/d' -e '/made their first contribution/d')
        gh release edit "$TAG" -R "$GITHUB_REPOSITORY" --notes "$cleaned"
